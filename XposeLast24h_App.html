<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XposeLast24h">
<meta name="description" content="XposeLast24h — Real News. Real Fast. Trusted, unfiltered stories from India and the world.">
<meta property="og:title" content="XposeLast24h — Real News. Real Fast.">
<meta property="og:description" content="Trusted. Unfiltered. Always Ahead.">
<meta property="og:type" content="website">
<title>XposeLast24h — Real News. Real Fast.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ================================================================
   XposeLast24h — Complete Stylesheet
   Dark-first · Glassmorphism · Apple Liquid Glass inspired
   ================================================================ */

/* ── 1. DESIGN TOKENS ────────────────────────────────────────── */
:root {
  --bg-base:       #080808;
  --bg-1:          #111111;
  --bg-2:          #181818;
  --bg-3:          #1e1e1e;
  --bg-card:       rgba(255,255,255,0.04);
  --bg-card-h:     rgba(255,255,255,0.07);
  --glass:         rgba(255,255,255,0.06);
  --glass-strong:  rgba(255,255,255,0.10);

  --accent:        #E8272F;
  --accent-l:      #FF4040;
  --accent-d:      #C41E26;
  --accent-glow:   rgba(232,39,47,0.35);
  --accent-subtle: rgba(232,39,47,0.12);

  --text-1:  #FFFFFF;
  --text-2:  #B0B0B0;
  --text-3:  #6A6A6A;
  --text-4:  #3A3A3A;

  --border:   rgba(255,255,255,0.08);
  --border-l: rgba(255,255,255,0.14);
  --border-a: rgba(232,39,47,0.4);

  --r-sm:   8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  22px;
  --r-2xl: 30px;
  --r-f:   9999px;

  --sh-sm:   0 2px 10px rgba(0,0,0,0.4);
  --sh-md:   0 4px 24px rgba(0,0,0,0.5);
  --sh-lg:   0 8px 40px rgba(0,0,0,0.6);
  --sh-red:  0 4px 24px rgba(232,39,47,0.4);
  --sh-card: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.4);

  --nav-h:  60px;
  --top-h:  56px;

  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:    cubic-bezier(0.22,1,0.36,1);
  --t-fast:  140ms;
  --t-base:  260ms;
  --t-slow:  420ms;

  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
}

/* ── LIGHT MODE ──────────────────────────────────────────────── */
[data-theme="light"] {
  --bg-base:      #F2F2F7;
  --bg-1:         #FFFFFF;
  --bg-2:         #F8F8F8;
  --bg-3:         #EFEFEF;
  --bg-card:      rgba(0,0,0,0.03);
  --bg-card-h:    rgba(0,0,0,0.055);
  --glass:        rgba(255,255,255,0.7);
  --glass-strong: rgba(255,255,255,0.9);
  --text-1:  #111111;
  --text-2:  #555555;
  --text-3:  #999999;
  --text-4:  #CCCCCC;
  --border:   rgba(0,0,0,0.08);
  --border-l: rgba(0,0,0,0.14);
  --sh-sm:   0 2px 10px rgba(0,0,0,0.08);
  --sh-md:   0 4px 24px rgba(0,0,0,0.10);
  --sh-lg:   0 8px 40px rgba(0,0,0,0.12);
  --sh-card: 0 1px 0 rgba(255,255,255,0.8), 0 4px 20px rgba(0,0,0,0.08);
}

/* ── 2. RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-1);
  line-height: 1.5;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; object-fit: cover; }
button { cursor: pointer; font-family: var(--font); border: none; background: none; }
a { text-decoration: none; color: inherit; }
input, textarea { font-family: var(--font); }
::selection { background: var(--accent-subtle); color: var(--text-1); }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-4); border-radius: var(--r-f); }

/* ── 3. APP SHELL ────────────────────────────────────────────── */
#app {
  width: 100%;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* ── 4. VIEWS / PAGES ────────────────────────────────────────── */
.view {
  position: absolute;
  inset: 0;
  background: var(--bg-base);
  overflow-y: auto;
  overflow-x: hidden;
  transform: translateX(100%);
  opacity: 0;
  transition: transform var(--t-base) var(--ease-out),
              opacity var(--t-base) ease;
  pointer-events: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
}
.view.active {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}
.view.slide-back {
  transform: translateX(-30%);
  opacity: 0;
}
/* Splash has no bottom nav */
#view-splash { padding-bottom: 0; }
/* Views without bottom nav */
#view-article, #view-admin, #view-cms { padding-bottom: 0; }

/* ── 5. SPLASH / WELCOME ─────────────────────────────────────── */
.splash {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 60px 32px 48px;
  background: radial-gradient(ellipse at 60% 20%, rgba(232,39,47,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(200,200,200,0.05) 0%, transparent 50%),
              linear-gradient(160deg, #151515 0%, #0a0a0a 60%, #111 100%);
  position: relative;
  overflow: hidden;
}
[data-theme="light"] .splash {
  background: radial-gradient(ellipse at 60% 20%, rgba(232,39,47,0.08) 0%, transparent 60%),
              linear-gradient(160deg, #f8f8f8 0%, #f0f0f0 100%);
}
.splash::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,39,47,0.08), transparent 70%);
  pointer-events: none;
}
.splash-logo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex: 1;
  justify-content: center;
  animation: fadeSlideUp 0.8s var(--ease-out) 0.1s both;
}
.splash-x-icon {
  width: 120px; height: 120px;
  display: grid; place-items: center;
  position: relative;
  margin-bottom: 8px;
}
.splash-x-glass {
  width: 110px; height: 110px;
  border-radius: 28px;
  background: linear-gradient(135deg,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0.04) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  display: grid;
  place-items: center;
  animation: splashPulse 3s ease-in-out infinite;
}
.splash-x-letter {
  font-size: 3.6rem;
  font-weight: 900;
  font-style: italic;
  background: linear-gradient(135deg, #FF4040, #E8272F, #C41E26);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(232,39,47,0.6));
  line-height: 1;
}
.splash-wordmark {
  display: flex;
  align-items: baseline;
  gap: 0;
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.splash-wordmark .wx { color: var(--accent); font-style: italic; }
.splash-wordmark .wpose { color: var(--text-1); }
.splash-wordmark .wlast { color: var(--accent); }
.splash-tagline {
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-top: -4px;
}
.splash-hero {
  text-align: center;
  animation: fadeSlideUp 0.8s var(--ease-out) 0.3s both;
}
.splash-headline {
  font-size: 1.9rem;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  color: var(--text-1);
  margin-bottom: 12px;
}
.splash-headline span { color: var(--accent); }
.splash-sub {
  font-size: 0.95rem;
  color: var(--text-2);
  line-height: 1.6;
}
.splash-sub span { color: var(--accent); font-weight: 600; }
.splash-cta {
  width: 100%;
  animation: fadeSlideUp 0.8s var(--ease-out) 0.5s both;
}
.btn-splash {
  width: 100%;
  height: 56px;
  border-radius: var(--r-f);
  background: var(--bg-2);
  border: 1px solid var(--border-l);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px 0 24px;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-1);
  transition: all var(--t-base) var(--ease-spring);
  box-shadow: var(--sh-sm);
}
.btn-splash:active { transform: scale(0.97); }
.btn-splash-arrow {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-l), var(--accent));
  display: grid;
  place-items: center;
  box-shadow: var(--sh-red);
  transition: transform var(--t-fast) var(--ease-spring);
}
.btn-splash:active .btn-splash-arrow { transform: scale(0.9); }
.splash-dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
.splash-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-4);
  transition: all var(--t-base);
}
.splash-dot.active { width: 20px; border-radius: 3px; background: var(--accent); }

/* ── 6. TOP NAVIGATION ───────────────────────────────────────── */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--top-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] .top-nav {
  background: rgba(255,255,255,0.85);
}
.top-nav-logo {
  display: flex;
  align-items: baseline;
  gap: 0;
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.top-nav-logo .lx    { color: var(--accent); font-style: italic; font-size: 1.4em; line-height: 1; }
.top-nav-logo .lpose { color: var(--text-1); }
.top-nav-logo .llast { color: var(--accent); }
.top-nav-actions { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--text-2);
  transition: background var(--t-fast), color var(--t-fast);
  position: relative;
}
.icon-btn:hover, .icon-btn:active { background: var(--bg-card-h); color: var(--text-1); }
.notif-badge {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-base);
  animation: badgePulse 2s ease infinite;
}

/* Simple Page Headers */
.page-header {
  height: var(--top-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] .page-header {
  background: rgba(255,255,255,0.85);
}
.page-header-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-1);
}

/* ── 7. BOTTOM NAVIGATION ────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(12,12,12,0.92);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 200;
  transform: translateY(0);
  transition: transform var(--t-base) var(--ease-out);
}
[data-theme="light"] .bottom-nav {
  background: rgba(255,255,255,0.92);
}
.bottom-nav.hidden { transform: translateY(110%); }
.nav-item {
  flex: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--text-3);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color var(--t-fast);
  border: none;
  background: none;
}
.nav-item svg { transition: transform var(--t-fast) var(--ease-spring); }
.nav-item.active { color: var(--accent); }
.nav-item.active svg { transform: scale(1.12); }
.nav-item .nav-icon-wrap {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  position: relative;
}
.nav-live-dot {
  position: absolute;
  top: 0; right: 0;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: badgePulse 1.5s ease infinite;
}

/* ── 8. SEARCH BAR ───────────────────────────────────────────── */
.search-wrap { padding: 10px 16px; }
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-f);
  padding: 0 14px;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
.search-bar:focus-within {
  border-color: var(--border-a);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.search-bar input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-1);
  font-size: 0.9rem;
  placeholder-color: var(--text-3);
}
.search-bar input::placeholder { color: var(--text-3); }
.search-bar svg { color: var(--text-3); flex-shrink: 0; }

/* ── 9. CATEGORY PILLS ───────────────────────────────────────── */
.pills-wrap {
  display: flex;
  gap: 8px;
  padding: 0 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  height: 34px;
  padding: 0 16px;
  border-radius: var(--r-f);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  font-size: 0.82rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: all var(--t-fast);
  white-space: nowrap;
}
.pill:hover { background: var(--bg-card-h); color: var(--text-1); }
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: var(--sh-red);
}
.pill-icon { display: flex; align-items: center; }

/* ── 10. CAROUSEL / FEATURED CARDS ──────────────────────────── */
.carousel-wrap { padding: 0 0 16px; position: relative; }
.carousel-track {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 0;
}
.carousel-track::-webkit-scrollbar { display: none; }
.carousel-slide {
  flex: 0 0 calc(100% - 32px);
  margin-left: 16px;
  scroll-snap-align: start;
}
.carousel-slide:last-child { margin-right: 16px; }
.featured-card {
  height: 260px;
  border-radius: var(--r-xl);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  box-shadow: var(--sh-md);
  transition: transform var(--t-base) var(--ease-spring),
              box-shadow var(--t-base);
}
.featured-card:active { transform: scale(0.98); }
.featured-card-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.featured-card-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.92) 0%,
    rgba(0,0,0,0.55) 45%,
    rgba(0,0,0,0.15) 80%,
    transparent 100%
  );
}
.featured-card-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
}
.featured-card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.featured-card-time {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.6);
}
.featured-card-title {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.25;
  color: #fff;
  margin-bottom: 8px;
  letter-spacing: -0.2px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.featured-card-summary {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.7);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}
.btn-read-more {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 34px;
  padding: 0 16px;
  border-radius: var(--r-f);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  transition: background var(--t-fast);
}
.btn-read-more:active { background: rgba(255,255,255,0.25); }
.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding-top: 12px;
}
.c-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-4);
  transition: all var(--t-base);
  border: none;
}
.c-dot.active { width: 18px; border-radius: 3px; background: var(--accent); }

/* ── 11. CATEGORY BADGE ──────────────────────────────────────── */
.cat-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--accent);
  color: #fff;
}
.cat-badge.top-story {
  background: var(--accent);
  box-shadow: var(--sh-red);
}
.cat-badge svg { width: 10px; height: 10px; }

/* ── 12. SECTION HEADERS ─────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 10px;
}
.section-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.2px;
}
.section-link {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  transition: opacity var(--t-fast);
}
.section-link:active { opacity: 0.7; }

/* ── 13. LIST ARTICLE CARDS ──────────────────────────────────── */
.article-list { padding: 0 16px; display: flex; flex-direction: column; gap: 2px; }
.article-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: background var(--t-fast);
  background: transparent;
  border: none;
  width: 100%;
  text-align: left;
}
.article-card:active { background: var(--bg-card-h); }
.article-thumb {
  width: 70px; height: 70px;
  border-radius: var(--r-md);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.article-thumb img { width: 100%; height: 100%; object-fit: cover; }
.article-thumb-fallback {
  width: 100%; height: 100%;
  display: grid;
  place-items: center;
  font-size: 1.4rem;
}
.article-body { flex: 1; min-width: 0; }
.article-cat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.article-cat-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.article-time { font-size: 0.67rem; color: var(--text-3); }
.article-title {
  font-size: 0.88rem;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text-1);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
  letter-spacing: -0.1px;
}
.article-summary {
  font-size: 0.77rem;
  color: var(--text-2);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bookmark-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--text-3);
  flex-shrink: 0;
  transition: color var(--t-fast), background var(--t-fast);
}
.bookmark-btn:active { background: var(--bg-card-h); }
.bookmark-btn.saved { color: var(--accent); }

/* ── 14. ARTICLE DETAIL PAGE ─────────────────────────────────── */
.article-detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--top-h);
  padding: 0 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
[data-theme="light"] .article-detail-header {
  background: rgba(255,255,255,0.85);
}
.article-detail-header .header-actions {
  display: flex;
  align-items: center;
  gap: 2px;
}
#view-article {
  padding-bottom: 40px;
}
.article-hero {
  width: 100%;
  height: 240px;
  position: relative;
  overflow: hidden;
}
.article-hero img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.article-hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(8,8,8,1) 0%, transparent 60%);
}
.article-hero-fallback {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  font-size: 4rem;
}
.article-content-wrap { padding: 0 16px 32px; }
.article-cat-badge-row {
  margin: -4px 0 14px;
}
.article-headline {
  font-size: 1.55rem;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--text-1);
  margin-bottom: 16px;
}
.article-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.article-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: #fff;
  flex-shrink: 0;
}
.article-author-info { flex: 1; }
.article-author-name {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-1);
}
.verified-icon { color: var(--accent); display: flex; }
.article-date {
  font-size: 0.75rem;
  color: var(--text-3);
  margin-top: 1px;
}
.article-engagement {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.engage-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 14px;
  border-radius: var(--r-f);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 0.82rem;
  font-weight: 500;
  transition: all var(--t-fast);
}
.engage-btn:active { background: var(--bg-card-h); }
.engage-btn.liked { color: var(--accent); border-color: var(--accent-subtle); background: var(--accent-subtle); }
.engage-btn svg { flex-shrink: 0; }
.listen-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 14px;
  border-radius: var(--r-f);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 0.82rem;
  font-weight: 500;
  margin-left: auto;
  transition: all var(--t-fast);
}
.key-takeaway {
  background: linear-gradient(135deg,rgba(232,39,47,0.1),rgba(232,39,47,0.05));
  border: 1px solid rgba(232,39,47,0.25);
  border-radius: var(--r-lg);
  padding: 16px;
  margin-bottom: 24px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.key-takeaway-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.key-takeaway-text {
  font-size: 0.88rem;
  line-height: 1.55;
  color: var(--text-1);
  font-weight: 400;
}
.article-body-text {
  font-size: 0.95rem;
  line-height: 1.75;
  color: var(--text-2);
}
.article-body-text p { margin-bottom: 1.2em; }
.article-body-text p:last-child { margin-bottom: 0; }
.article-share-row {
  display: flex;
  gap: 10px;
  padding: 20px 0 0;
  border-top: 1px solid var(--border);
  margin-top: 24px;
}
.share-chip {
  flex: 1;
  height: 40px;
  border-radius: var(--r-f);
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-2);
  transition: all var(--t-fast);
}
.share-chip:active { background: var(--bg-card-h); }

/* ── 15. EXPLORE PAGE ────────────────────────────────────────── */
.explore-layout {
  display: flex;
  min-height: calc(100dvh - var(--top-h) - var(--nav-h));
}
.explore-sidebar {
  width: 130px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 12px 0;
  background: var(--bg-1);
}
.explore-sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  width: 100%;
  text-align: left;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-2);
  border: none;
  background: none;
  transition: all var(--t-fast);
  border-left: 2px solid transparent;
  cursor: pointer;
}
.explore-sidebar-item:active, .explore-sidebar-item.active {
  color: var(--text-1);
  background: var(--bg-card-h);
}
.explore-sidebar-item.active {
  border-left-color: var(--accent);
  color: var(--accent);
  background: var(--accent-subtle);
}
.explore-sidebar-icon { width: 16px; height: 16px; flex-shrink: 0; }
.explore-main { flex: 1; overflow: hidden; }
.explore-featured-cat {
  margin: 16px;
  height: 110px;
  border-radius: var(--r-xl);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.explore-featured-cat-bg {
  position: absolute; inset: 0;
}
.explore-featured-cat-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 14px 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.explore-featured-cat-name {
  font-size: 1.3rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.3px;
}
.explore-featured-cat-sub {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
}
.explore-followers {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.8);
  position: absolute;
  bottom: 14px; right: 14px;
}
.trending-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 8px;
  margin-top: 4px;
}
.trending-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-1);
}
.trending-link {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
}
.explore-articles { padding: 0 10px; }
.explore-article-card {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background var(--t-fast);
}
.explore-article-card:active { background: var(--bg-card-h); }
.explore-thumb {
  width: 58px; height: 58px;
  border-radius: var(--r-md);
  overflow: hidden;
  flex-shrink: 0;
}
.explore-thumb img, .explore-thumb-fallback {
  width: 100%; height: 100%;
}
.explore-thumb-fallback { display: grid; place-items: center; font-size: 1.2rem; }
.explore-article-title {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-1);
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.explore-article-time { font-size: 0.68rem; color: var(--text-3); }
.explore-article-trend {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 0.68rem;
  color: #4CAF50;
  margin-left: auto;
  flex-shrink: 0;
}

/* ── 16. SEARCH VIEW ─────────────────────────────────────────── */
.search-page { padding: 0; }
.search-full-bar {
  padding: 8px 16px 12px;
  position: sticky;
  top: var(--top-h);
  z-index: 50;
  background: var(--bg-base);
}
.search-results-wrap { padding: 0 0 8px; }
.search-section-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 12px 16px 8px;
}
.search-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 32px;
  text-align: center;
  gap: 12px;
}
.search-empty-icon { font-size: 3rem; opacity: 0.3; }
.search-empty-text { font-size: 0.9rem; color: var(--text-3); line-height: 1.5; }
.recent-search-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  font-size: 0.88rem;
  color: var(--text-2);
  cursor: pointer;
  transition: background var(--t-fast);
}
.recent-search-item:active { background: var(--bg-card-h); }
.trending-topic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 8px 16px;
}
.trending-topic-chip {
  padding: 10px 12px;
  border-radius: var(--r-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--t-fast);
}
.trending-topic-chip:active { background: var(--bg-card-h); }
.trending-topic-chip span { display: block; font-size: 0.7rem; color: var(--text-3); margin-top: 2px; }

/* ── 17. BOOKMARKS VIEW ──────────────────────────────────────── */
.bookmarks-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 14px;
  text-align: center;
  padding: 32px;
}
.bookmarks-empty-icon { font-size: 4rem; opacity: 0.25; }
.bookmarks-empty-title { font-size: 1.1rem; font-weight: 700; color: var(--text-1); }
.bookmarks-empty-sub { font-size: 0.85rem; color: var(--text-3); line-height: 1.5; }
.bookmarks-stats {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  margin-bottom: 4px;
}
.bookmark-stat-chip {
  flex: 1;
  padding: 12px;
  border-radius: var(--r-lg);
  background: var(--bg-card);
  border: 1px solid var(--border);
  text-align: center;
}
.bookmark-stat-num { font-size: 1.3rem; font-weight: 800; color: var(--text-1); }
.bookmark-stat-label { font-size: 0.7rem; color: var(--text-3); margin-top: 2px; }

/* ── 18. NOTIFICATIONS VIEW ──────────────────────────────────── */
.notif-list { padding: 8px 16px; display: flex; flex-direction: column; gap: 2px; }
.notif-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: background var(--t-fast);
  position: relative;
}
.notif-item:active { background: var(--bg-card-h); }
.notif-item.unread { background: rgba(232,39,47,0.04); }
.notif-item.unread::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.notif-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.notif-icon-wrap.breaking { background: rgba(232,39,47,0.15); color: var(--accent); }
.notif-icon-wrap.trending  { background: rgba(255,152,0,0.15); color: #FF9800; }
.notif-icon-wrap.category  { background: rgba(33,150,243,0.15); color: #2196F3; }
.notif-icon-wrap.live      { background: rgba(76,175,80,0.15);  color: #4CAF50; }
.notif-icon-wrap.following { background: rgba(156,39,176,0.15); color: #9C27B0; }
.notif-content { flex: 1; min-width: 0; }
.notif-title { font-size: 0.85rem; font-weight: 600; color: var(--text-1); margin-bottom: 3px; }
.notif-message { font-size: 0.78rem; color: var(--text-2); line-height: 1.4; }
.notif-time { font-size: 0.7rem; color: var(--text-3); flex-shrink: 0; }

/* ── 19. PROFILE VIEW ────────────────────────────────────────── */
.profile-hero {
  background: linear-gradient(180deg, rgba(232,39,47,0.15) 0%, transparent 100%);
  padding: 28px 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
}
.profile-avatar-wrap { position: relative; }
.profile-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-d));
  display: grid; place-items: center;
  font-size: 2rem;
  font-weight: 700;
  color: #fff;
  border: 3px solid var(--accent);
  box-shadow: 0 0 0 4px var(--accent-subtle);
}
.profile-admin-badge {
  position: absolute;
  bottom: 0; right: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-base);
  display: grid; place-items: center;
}
.profile-name { font-size: 1.2rem; font-weight: 700; color: var(--text-1); }
.profile-username { font-size: 0.82rem; color: var(--text-3); }
.profile-bio { font-size: 0.82rem; color: var(--text-2); line-height: 1.5; }
.profile-stats {
  display: flex;
  gap: 0;
  margin: 4px 0 8px;
}
.profile-stat {
  flex: 1;
  text-align: center;
  padding: 16px 12px;
  border-right: 1px solid var(--border);
  background: var(--bg-card);
}
.profile-stat:first-child { border-radius: var(--r-lg) 0 0 var(--r-lg); }
.profile-stat:last-child { border-right: none; border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.profile-stat-num { font-size: 1.3rem; font-weight: 800; color: var(--text-1); }
.profile-stat-label { font-size: 0.68rem; color: var(--text-3); margin-top: 3px; }
.settings-section { padding: 8px 16px; }
.settings-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.settings-group-title {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 10px 16px 6px;
}
.settings-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--t-fast);
}
.settings-item:first-of-type { border-top: none; }
.settings-item:active { background: var(--bg-card-h); }
.settings-item-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.settings-item-label { flex: 1; font-size: 0.88rem; color: var(--text-1); font-weight: 500; }
.settings-item-value { font-size: 0.8rem; color: var(--text-3); }
.settings-item-arrow { color: var(--text-4); }
.toggle-switch {
  width: 44px; height: 26px;
  border-radius: 13px;
  background: var(--text-4);
  position: relative;
  transition: background var(--t-base);
  cursor: pointer;
  border: none;
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--accent); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: transform var(--t-base) var(--ease-spring);
}
.toggle-switch.on .toggle-knob { transform: translateX(18px); }
.btn-logout {
  width: 100%;
  height: 50px;
  border-radius: var(--r-lg);
  background: rgba(232,39,47,0.1);
  border: 1px solid rgba(232,39,47,0.2);
  color: var(--accent);
  font-size: 0.9rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all var(--t-fast);
  margin: 8px 16px;
  width: calc(100% - 32px);
}
.btn-logout:active { background: rgba(232,39,47,0.2); }

/* ── 20. VIDEO / LIVE VIEW ───────────────────────────────────── */
.video-hero {
  margin: 16px;
  height: 200px;
  border-radius: var(--r-xl);
  overflow: hidden;
  position: relative;
  cursor: pointer;
}
.video-hero-bg {
  width: 100%; height: 100%;
  display: grid; place-items: center;
}
.video-play-btn {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.4);
  display: grid; place-items: center;
  color: #fff;
  transition: transform var(--t-fast) var(--ease-spring);
  flex-shrink: 0;
}
.video-play-btn:active { transform: scale(0.92); }
.video-hero-meta {
  position: absolute;
  bottom: 14px; left: 14px; right: 14px;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 8px;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.live-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fff;
  animation: badgePulse 1s ease infinite;
}
.video-grid { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
.video-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: background var(--t-fast);
}
.video-card:active { background: var(--bg-card-h); }
.video-thumb {
  width: 90px; height: 58px;
  border-radius: var(--r-md);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.video-thumb-bg { width: 100%; height: 100%; display: grid; place-items: center; font-size: 1.5rem; }
.video-duration {
  position: absolute;
  bottom: 4px; right: 4px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
}
.video-duration.live {
  background: var(--accent);
  animation: badgePulse 1.5s ease infinite;
}
.video-info { flex: 1; min-width: 0; }
.video-cat { font-size: 0.68rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.video-title {
  font-size: 0.84rem;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text-1);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-views { font-size: 0.7rem; color: var(--text-3); margin-top: 4px; }

/* ── 21. TRENDING VIEW ───────────────────────────────────────── */
.trending-hero-strip {
  margin: 16px;
  padding: 16px;
  border-radius: var(--r-xl);
  background: linear-gradient(135deg, rgba(232,39,47,0.15), rgba(232,39,47,0.05));
  border: 1px solid rgba(232,39,47,0.2);
}
.trending-hero-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  display: flex;

  gap: 5px;

.trending-hero-title { font-size: 1.15rem; font-weight: 700; color: var(--text-1); line-height: 1.3; }

.trending-number {

  font-size: 0.72rem;
  font-weight: 800;
  display: grid; place-items: center;
  flex-shrink: 0;

/* ── 22. ADMIN DASHBOARD ─────────────────────────────────────── */
.admin-view {
  min-height: 100dvh;
  background: var(--bg-base);
  padding-bottom: 32px;
}
.admin-header {
  height: var(--top-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.admin-header-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-1);
}
.admin-header-sub { font-size: 0.72rem; color: var(--text-3); margin-top: 1px; }
.admin-stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
}
.admin-stat-card {
  padding: 16px;
  border-radius: var(--r-lg);
  background: var(--bg-card);
  border: 1px solid var(--border);
  box-shadow: var(--sh-sm);
}
.admin-stat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.admin-stat-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
}
.admin-stat-change {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: var(--r-f);
}
.admin-stat-change.up { background: rgba(76,175,80,0.15); color: #4CAF50; }
.admin-stat-change.down { background: rgba(232,39,47,0.15); color: var(--accent); }
.admin-stat-value {
  font-size: 1.55rem;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -0.5px;
  margin-bottom: 3px;
}
.admin-stat-label { font-size: 0.72rem; color: var(--text-3); }
.admin-section {
  padding: 8px 16px;
  margin-bottom: 4px;
}
.admin-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.admin-section-title { font-size: 0.92rem; font-weight: 700; color: var(--text-1); }
.admin-section-link { font-size: 0.78rem; color: var(--accent); font-weight: 600; }

/* Bar chart */
.bar-chart {
  height: 140px;
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 0 4px 20px;
  position: relative;
}
.bar-chart-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-chart-bar {
  width: 100%;
  border-radius: 3px 3px 0 0;
  background: linear-gradient(to top, var(--accent-d), var(--accent));
  min-height: 4px;
  transition: height 0.6s var(--ease-out);
  position: relative;
}
.bar-chart-bar.highlight { background: linear-gradient(to top, var(--accent), var(--accent-l)); box-shadow: 0 0 8px var(--accent-glow); }
.bar-chart-label { font-size: 0.6rem; color: var(--text-3); }

/* Category distribution */
.cat-dist-list { display: flex; flex-direction: column; gap: 8px; }
.cat-dist-item { display: flex; align-items: center; gap: 10px; }
.cat-dist-name { font-size: 0.78rem; color: var(--text-2); width: 90px; flex-shrink: 0; }
.cat-dist-bar-wrap { flex: 1; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
.cat-dist-bar { height: 100%; border-radius: 3px; transition: width 0.8s var(--ease-out); }
.cat-dist-pct { font-size: 0.72rem; color: var(--text-3); width: 30px; text-align: right; flex-shrink: 0; }

/* Admin table */
.admin-table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.admin-table-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  transition: background var(--t-fast);
  cursor: pointer;
}
.admin-table-row:last-child { border-bottom: none; }
.admin-table-row:active { background: var(--bg-card-h); }
.admin-table-title { flex: 1; font-size: 0.8rem; font-weight: 500; color: var(--text-1); min-width: 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.admin-table-cat { font-size: 0.68rem; font-weight: 600; padding: 2px 7px; border-radius: 3px; flex-shrink: 0; }
.status-chip { font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: var(--r-f); flex-shrink: 0; }
.status-chip.published { background: rgba(76,175,80,0.15); color: #4CAF50; }
.status-chip.draft { background: rgba(255,152,0,0.15); color: #FF9800; }
.admin-views { font-size: 0.72rem; color: var(--text-3); flex-shrink: 0; }

/* ── 23. CMS VIEW ────────────────────────────────────────────── */
.cms-toolbar {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-1);
  position: sticky;
  top: var(--top-h);
  z-index: 50;
}
.btn-add {
  display: flex;
  align-items: center;
  gap: 7px;
  height: 38px;
  padding: 0 16px;
  border-radius: var(--r-f);
  background: var(--accent);
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  box-shadow: var(--sh-red);
  transition: all var(--t-fast) var(--ease-spring);
}
.btn-add:active { transform: scale(0.96); }
.cms-filter {
  flex: 1;
  height: 38px;
  padding: 0 12px;
  border-radius: var(--r-f);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 0.82rem;
  outline: none;
  -webkit-appearance: none;
}
.cms-article-list { padding: 8px 16px; display: flex; flex-direction: column; gap: 10px; }
.cms-article-card {
  padding: 14px;
  border-radius: var(--r-lg);
  background: var(--bg-card);
  border: 1px solid var(--border);
  transition: border-color var(--t-fast);
}
.cms-article-card:hover { border-color: var(--border-l); }
.cms-article-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cms-article-title { font-size: 0.9rem; font-weight: 600; color: var(--text-1); line-height: 1.3; margin-bottom: 8px; }
.cms-article-info { font-size: 0.75rem; color: var(--text-3); margin-bottom: 10px; }
.cms-article-actions { display: flex; gap: 8px; }
.btn-edit {
  display: flex; align-items: center; gap: 5px;
  height: 32px; padding: 0 12px;
  border-radius: var(--r-f);
  background: var(--bg-card-h);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 0.78rem; font-weight: 500;
  transition: all var(--t-fast);
}
.btn-edit:active { background: var(--glass-strong); }
.btn-del {
  display: flex; align-items: center; gap: 5px;
  height: 32px; padding: 0 12px;
  border-radius: var(--r-f);
  background: rgba(232,39,47,0.08);
  border: 1px solid rgba(232,39,47,0.15);
  color: var(--accent);
  font-size: 0.78rem; font-weight: 500;
  transition: all var(--t-fast);
}
.btn-del:active { background: rgba(232,39,47,0.18); }
.views-count { font-size: 0.72rem; color: var(--text-3); display: flex; align-items: center; gap: 4px; margin-left: auto; }

/* ── 24. MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-base);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%;
  max-height: 90dvh;
  background: var(--bg-2);
  border-radius: var(--r-2xl) var(--r-2xl) 0 0;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform var(--t-base) var(--ease-out);
  padding-bottom: env(safe-area-inset-bottom, 20px);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: var(--border-l);
  margin: 12px auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 1rem; font-weight: 700; color: var(--text-1); }
.form-group { padding: 12px 20px; }
.form-label { font-size: 0.78rem; font-weight: 600; color: var(--text-3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--r-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 0.9rem;
  outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: var(--border-a);
  box-shadow: 0 0 0 3px var(--accent-subtle);
}
.form-select {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--r-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 0.9rem;
  outline: none;
  -webkit-appearance: none;
}
textarea.form-input { min-height: 100px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; padding: 12px 20px 20px; }
.btn-primary {
  flex: 1;
  height: 48px;
  border-radius: var(--r-f);
  background: var(--accent);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 600;
  box-shadow: var(--sh-red);
  transition: all var(--t-fast) var(--ease-spring);
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  flex: 1;
  height: 48px;
  border-radius: var(--r-f);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-1);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all var(--t-fast);
}
.btn-secondary:active { background: var(--bg-card-h); }

/* ── 25. TOAST ───────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  min-width: 260px;
  max-width: calc(100vw - 32px);
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--r-lg);
  background: var(--bg-3);
  border: 1px solid var(--border-l);
  box-shadow: var(--sh-lg);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-1);
  animation: toastIn 0.3s var(--ease-spring) forwards;
  pointer-events: all;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.toast.success { border-color: rgba(76,175,80,0.4); }
.toast.error   { border-color: rgba(232,39,47,0.4); }
.toast.info    { border-color: rgba(33,150,243,0.4); }
.toast-icon { font-size: 1rem; }
.toast.exit { animation: toastOut 0.25s ease forwards; }

/* ── 26. LOADING / SKELETON ──────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg,
    var(--bg-3) 0%, var(--bg-card-h) 50%, var(--bg-3) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease infinite;
  border-radius: var(--r-md);
}
.loading-overlay {
  position: absolute; inset: 0;
  background: var(--bg-base);
  display: grid; place-items: center;
  z-index: 50;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--bg-3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ── 27. UTILITY CLASSES ─────────────────────────────────────── */
.hidden  { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
.text-accent  { color: var(--accent); }
.text-2       { color: var(--text-2); }
.text-3       { color: var(--text-3); }
.font-bold    { font-weight: 700; }
.font-medium  { font-weight: 500; }
.flex         { display: flex; }
.items-center { align-items: center; }
.gap-2        { gap: 8px; }
.mt-auto      { margin-top: auto; }

/* ── 28. ANIMATIONS & KEYFRAMES ──────────────────────────────── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes splashPulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15); }
  50%       { box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 30px rgba(232,39,47,0.25), inset 0 1px 0 rgba(255,255,255,0.2); }
}
@keyframes badgePulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.3); opacity: 0.7; }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.92); }
}
@keyframes artReveal {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 29. RESPONSIVE — TABLET ─────────────────────────────────── */
@media (min-width: 600px) {
  .admin-stats-grid { grid-template-columns: repeat(4,1fr); }
  .featured-card { height: 300px; }
  .carousel-slide { flex: 0 0 calc(80% - 16px); }
  .trending-topic-grid { grid-template-columns: repeat(3,1fr); }
}

/* ── 30. RESPONSIVE — DESKTOP ────────────────────────────────── */
@media (min-width: 1024px) {
  body { overflow: auto; display: flex; justify-content: center; }
  #app {
    max-width: 480px;
    height: 100dvh;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
    border-radius: 0;
    position: relative;
  }
  .bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); }
  .bottom-nav.hidden { transform: translateX(-50%) translateY(110%); }
  #toast-container { max-width: 440px; }
}

/* ── ACCESSIBILITY ───────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

</style>

   ================================================================ */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
const fmtNum = n => n >= 1000 ? (n/1000).toFixed(1) + 'K' : n;
const getCatMeta = id => APP_DATA.categories.find(c => c.id === id) || APP_DATA.categories[0];
const getCatIcon = id => {
  const icons = { india:'flag', world:'globe', business:'chart', technology:'cpu', politics:'shield', sports:'trophy', entertainment:'film', science:'flask', all:'grid' };
  return IC[icons[id] || 'globe'];
};
const saveBookmarks = () => localStorage.setItem('xp24h-bm', JSON.stringify(STATE.bookmarks));
const isBookmarked  = id => STATE.bookmarks.includes(id);

function showToast(msg, type = 'info', icon = '📰') {
  const wrap = $('#toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('exit'); setTimeout(() => el.remove(), 260); }, 2800);
}

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('xp24h-theme', t);
  STATE.theme = t;
}

/* ================================================================
   4. ROUTER / NAVIGATION
   ================================================================ */
const VIEWS_WITH_NAV  = ['home','explore','bookmarks','video','profile','search','notifications','trending'];
const VIEWS_NO_NAV    = ['splash','article','admin','cms'];

function navigate(view, params = {}) {
  if (view === STATE.view) return;
  const prev = $('.view.active');
  const next = $(`#view-${view}`);
  if (!next) return;

  STATE.prevView = STATE.view;
  STATE.view = view;

  if (prev) { prev.classList.add('slide-back'); setTimeout(() => prev.classList.remove('active','slide-back'), 320); }
  next.classList.add('active');

  // bottom nav
  const nav = $('#bottom-nav');
  VIEWS_NO_NAV.includes(view) ? nav.classList.add('hidden') : nav.classList.remove('hidden');

  // update nav active state
  $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));

  // clear carousel timer when leaving home
  if (STATE.view !== 'home' && STATE.carouselTimer) {
    clearInterval(STATE.carouselTimer); STATE.carouselTimer = null;
  }

  // render
  const renderers = {
    home:          renderHome,
    explore:       renderExplore,
    article:       () => renderArticle(params.id || STATE.article),
    search:        renderSearch,
    bookmarks:     renderBookmarks,
    profile:       renderProfile,
    notifications: renderNotifications,
    video:         renderVideo,
    trending:      renderTrending,
    admin:         renderAdmin,
    cms:           renderCMS,
  };
  if (renderers[view]) renderers[view]();

  // scroll to top
  next.scrollTop = 0;
}

function goBack() {
  navigate(STATE.prevView || 'home');
}

/* ================================================================
   5. BOOKMARK HELPERS
   ================================================================ */
function toggleBookmark(id, el) {
  const idx = STATE.bookmarks.indexOf(id);
  if (idx === -1) {
    STATE.bookmarks.push(id);
    showToast('Saved to Bookmarks', 'success', '🔖');
  } else {
    STATE.bookmarks.splice(idx, 1);
    showToast('Removed from Bookmarks', 'info', '🗑️');
  }
  saveBookmarks();
  if (el) {
    el.innerHTML = isBookmarked(id) ? IC.bmFilled : IC.bookmark;
    el.classList.toggle('saved', isBookmarked(id));
  }

/* ================================================================
   8. CAROUSEL
   ================================================================ */
function initCarousel(total) {
  const track = $('#carousel-track'); if (!track) return;
  if (STATE.carouselTimer) clearInterval(STATE.carouselTimer);

  const updateDots = idx => {
    $$('.c-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  };

  track.addEventListener('scroll', () => {
    const idx = Math.round(track.scrollLeft / track.clientWidth);
    STATE.carouselIdx = idx;
    updateDots(idx);
  }, { passive: true });

  STATE.carouselTimer = setInterval(() => {
    const next = (STATE.carouselIdx + 1) % total;
    carouselGoTo(next);
  }, 4000);
}

function carouselGoTo(idx) {
  const track = $('#carousel-track'); if (!track) return;
  const slide = track.children[idx];
  if (slide) slide.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'start' });
  STATE.carouselIdx = idx;
  $$('.c-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

function doSearch(q) {
  STATE.searchQ = q;
  const res = $('#search-results'); if (!res) return;
  if (!q.trim()) { res.innerHTML = renderSearchHome(); return; }
  const matches = APP_DATA.articles.filter(a =>
    a.title.toLowerCase().includes(q.toLowerCase()) ||
    a.summary.toLowerCase().includes(q.toLowerCase()) ||
    a.categoryLabel.toLowerCase().includes(q.toLowerCase())
  );
  if (!matches.length) {
    res.innerHTML = `
      <div class="search-empty">
        <div class="search-empty-icon">🔍</div>
        <div class="search-empty-text">No results for "<strong>${q}</strong>"<br>Try different keywords.</div>
      </div>`;
    return;
  }
  res.innerHTML = `
    <div class="search-section-title">${matches.length} result${matches.length!==1?'s':''} for "${q}"</div>
    <div class="article-list">${matches.map(renderListCard).join('')}</div>`;
}

/* ================================================================

      <div class="trending-hero-label">${IC.lightning} Trending Now</div>
      <div class="trending-hero-title">${trending[0]?.title}</div>
      <div class="trending-hero-stats">
        <div class="trending-stat-item">${IC.heart} <strong>${fmtNum(trending[0]?.likes||0)}</strong> likes</div>
        <div class="trending-stat-item">${IC.comment} <strong>${trending[0]?.comments||0}</strong> comments</div>
        <div class="trending-stat-item">⏱ <strong>${trending[0]?.timeAgo}</strong></div>

    <div class="section-header"><span class="section-title">🔥 Hot Right Now</span></div>

}

/* ================================================================
   18. CONTENT MANAGEMENT VIEW
   ================================================================ */
function renderCMS() {
  const wrap = $('#cms-content'); if (!wrap) return;
  let filter = 'all';

  const buildList = (f) => {
    const arts = f === 'all'
      ? APP_DATA.articles
      : APP_DATA.articles.filter(a => (f==='published'?true:false)||a.category===f);
    return arts.map(a => {
      const meta = getCatMeta(a.category);
      return `
        <div class="cms-article-card">
          <div class="cms-article-meta">
            <span class="status-chip published">published</span>
            <span class="admin-table-cat" style="background:${meta.color}22;color:${meta.color};font-size:0.68rem;padding:2px 7px;border-radius:3px;font-weight:700">${a.categoryLabel}</span>
            <span class="admin-views">${IC.eye} ${fmtNum(a.likes*12)}</span>
          </div>
          <div class="cms-article-title">${a.title}</div>
          <div class="cms-article-info">${a.author} · ${a.date} · ${a.readTime}</div>
          <div class="cms-article-actions">
            <button class="btn-edit" onclick="showEditModal(${a.id})">${IC.edit} Edit</button>
            <button class="btn-del" onclick="showDeleteConfirm(${a.id})">${IC.trash} Delete</button>
          </div>
        </div>`;
    }).join('');
  };

  wrap.innerHTML = `
    <div class="cms-toolbar">
      <button class="btn-add" onclick="showAddModal()">${IC.plus} New Article</button>
      <select class="cms-filter" onchange="document.getElementById('cms-list').innerHTML=buildList?buildList(this.value):''">
        <option value="all">All Articles</option>
        ${APP_DATA.categories.slice(1).map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="cms-article-list" id="cms-list">
      ${buildList('all')}
    </div>`;
}

function showAddModal() {
  const overlay = $('#modal-overlay');
  const sheet   = $('#modal-sheet');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">${IC.plus} New Article</span>
      <button class="icon-btn" onclick="closeModal()">${IC.close}</button>
    </div>
    <div class="form-group">
      <div class="form-label">Title</div>
      <input class="form-input" placeholder="Article headline..." id="new-title">
    </div>
    <div class="form-group">
      <div class="form-label">Category</div>
      <select class="form-select" id="new-cat">
        ${APP_DATA.categories.slice(1).map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <div class="form-label">Summary</div>
      <textarea class="form-input" placeholder="Brief summary..." id="new-summary"></textarea>
    </div>
    <div class="form-group">
      <div class="form-label">Author</div>
      <input class="form-input" placeholder="Author name..." id="new-author" value="${APP_DATA.user.name}">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitNewArticle()">Publish ${IC.arrow}</button>
    </div>`;
  overlay.classList.add('open');
}

function showEditModal(id) {
  const a = APP_DATA.articles.find(x=>x.id===id); if(!a) return;
  const overlay = $('#modal-overlay');
  const sheet   = $('#modal-sheet');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">${IC.edit} Edit Article</span>
      <button class="icon-btn" onclick="closeModal()">${IC.close}</button>
    </div>
    <div class="form-group">
      <div class="form-label">Title</div>
      <input class="form-input" value="${a.title}" id="edit-title">
    </div>
    <div class="form-group">
      <div class="form-label">Category</div>
      <select class="form-select" id="edit-cat">
        ${APP_DATA.categories.slice(1).map(c=>`<option value="${c.id}"${a.category===c.id?' selected':''}>${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <div class="form-label">Summary</div>
      <textarea class="form-input" id="edit-summary">${a.summary}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitEdit(${id})">Save Changes</button>
    </div>`;
  overlay.classList.add('open');
}

function showDeleteConfirm(id) {
  const a = APP_DATA.articles.find(x=>x.id===id); if(!a) return;
  const overlay = $('#modal-overlay');
  const sheet   = $('#modal-sheet');
  sheet.innerHTML = `
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" style="color:var(--accent)">${IC.trash} Delete Article</span>
      <button class="icon-btn" onclick="closeModal()">${IC.close}</button>
    </div>
    <div style="padding:16px 20px">
      <p style="font-size:0.9rem;color:var(--text-2);line-height:1.6">
        Are you sure you want to delete<br><strong style="color:var(--text-1)">"${a.title}"</strong>?<br>
        This action cannot be undone.
      </p>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="background:#B71C1C" onclick="confirmDelete(${id})">Delete</button>
    </div>`;
  overlay.classList.add('open');
}

function closeModal() {
  $('#modal-overlay').classList.remove('open');
}

function submitNewArticle() {
  const title = $('#new-title')?.value?.trim();
  if (!title) { showToast('Please enter a title','error','⚠️'); return; }
  closeModal();
  showToast('Article published!', 'success', '✅');
}

function submitEdit(id) {
  closeModal();
  showToast('Changes saved!', 'success', '✅');
}

function confirmDelete(id) {
  closeModal();
  showToast('Article deleted', 'info', '🗑️');
  renderCMS();
}

/* ================================================================
   19. INITIALIZATION
   ================================================================ */
function init() {
  // Apply saved theme
  applyTheme(STATE.theme);

  // Wire bottom nav buttons
  $$('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.view));
  });

  // Wire modal overlay click to close
  const overlay = $('#modal-overlay');
  if (overlay) {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });
  }

  // Start on splash
  $('#view-splash').classList.add('active');
  $('#bottom-nav').classList.add('hidden');

  // Auto-progress from splash after 3.5s
  setTimeout(() => {
    const dot1 = $('.splash-dot');
    if (dot1) { dot1.classList.remove('active'); }
    const dots = $$('.splash-dot');
    if (dots[1]) dots[1].classList.add('active');
  }, 1200);

  console.log('%cXposeLast24h', 'color:#E8272F;font-size:2rem;font-weight:900');
  console.log('%cReal News · Real Fast', 'color:#aaa;font-size:1rem');
}

// Start when DOM is ready
document.addEventListener('DOMContentLoaded', init);

</script>
